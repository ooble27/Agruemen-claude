  <!-- Seat -->
  <path d="M366 258 Q395 244 448 238 Q498 233 548 236 L574 240 Q590 244 592 254 Q585 268 562 272 Q528 278 488 282 Q442 287 400 290 Q368 293 352 284 Q339 274 366 258Z"
        fill="#1C1C12"/>
  <!-- Seat highlight -->
  <path d="M378 263 Q405 252 450 247 Q495 242 540 245 L564 249 Q552 260 525 265 Q490 270 452 275 Q412 279 382 278 Q363 275 378 263Z"
        fill="#2C2C1C"/>

  <!-- Front fork + steering column -->
  <path d="M575 248 L608 285 Q622 308 618 358 L600 385 Q592 368 592 345 L598 308 L578 268Z"
        fill="#242418"/>
  <!-- Fork tube -->
  <path d="M580 254 L612 292 Q624 316 620 356"
        fill="none" stroke="#3C3C2C" stroke-width="3"/>

  <!-- Handlebar assembly -->
  <path d="M555 238 Q568 226 582 222 L618 221 Q634 224 638 234 Q630 248 612 250 L572 248 Q556 248 555 238Z"
        fill="#1C1C12"/>
  <!-- Right grip -->
  <rect x="618" y="218" width="32" height="14" rx="7" fill="#2C2C1C"/>
  <rect x="620" y="220" width="28" height="5" rx="2" fill="#404030" opacity="0.6"/>
  <!-- Speedometer -->
  <circle cx="585" cy="222" r="10" fill="#0A0A0A" stroke="#F07800" stroke-width="2"/>
  <circle cx="585" cy="222" r="5"  fill="#FAF8F4"/>

  <!-- Headlight -->
  <ellipse cx="638" cy="272" rx="16" ry="11" fill="#FAF8F4" stroke="#E8E4DA" stroke-width="1.5"/>
  <ellipse cx="638" cy="272" rx="12" ry="8"  fill="#FFF5CC"/>

  <!-- Windshield -->
  <path d="M566 224 Q582 208 604 208 Q620 208 626 220 Q614 234 596 238 Q578 241 566 232Z"
        fill="#C8D8E8" opacity="0.55"/>
  <path d="M568 226 Q582 212 602 212 Q616 212 620 222 Q608 234 592 237 Q578 240 568 230Z"
        fill="white" opacity="0.25"/>

  <!-- Box ↔ body connector rail -->
  <rect x="282" y="348" width="56" height="14" rx="5" fill="#242418"/>
  <rect x="270" y="354" width="80" height="7" rx="3" fill="#D96A00"/>

  <!-- Rear axle/chain area -->
  <circle cx="298" cy="368" r="20" fill="#181810" stroke="#242418" stroke-width="2.5"/>
  <circle cx="298" cy="368" r="11" fill="#242418"/>
  <circle cx="298" cy="368" r="5"  fill="#F07800"/>

  <!-- Exhaust pipe -->
  <path d="M258 368 Q236 372 218 385 Q234 388 260 382 Q266 375 258 368Z"
        fill="#242418"/>
  <ellipse cx="217" cy="385" rx="8" ry="5" fill="#181810"/>

  <!-- ═══ SPEED LINES ═══ -->
  <line x1="8"  y1="295" x2="56" y2="295" stroke="#F07800" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="2"  y1="318" x2="42" y2="318" stroke="#F07800" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="12" y1="342" x2="50" y2="342" stroke="#F07800" stroke-width="2"   stroke-linecap="round" opacity="0.45"/>
  <line x1="18" y1="362" x2="52" y2="362" stroke="#F07800" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>

</svg>
