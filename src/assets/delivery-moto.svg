<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" overflow="visible">

  <!-- Ground shadow -->
  <ellipse cx="388" cy="448" rx="268" ry="16" fill="rgba(10,10,10,0.09)"/>

  <!-- ═══ REAR WHEEL ═══ -->
  <circle cx="198" cy="372" r="82" fill="#0A0A0A"/>
  <circle cx="198" cy="372" r="62" fill="#181810"/>
  <!-- Spokes -->
  <line x1="198" y1="310" x2="198" y2="434" stroke="#0A0A0A" stroke-width="5"/>
  <line x1="136" y1="372" x2="260" y2="372" stroke="#0A0A0A" stroke-width="5"/>
  <line x1="154" y1="328" x2="242" y2="416" stroke="#0A0A0A" stroke-width="4"/>
  <line x1="242" y1="328" x2="154" y2="416" stroke="#0A0A0A" stroke-width="4"/>
  <!-- Orange rim band -->
  <circle cx="198" cy="372" r="46" fill="none" stroke="#F07800" stroke-width="10"/>
  <!-- Hub -->
  <circle cx="198" cy="372" r="18" fill="#0A0A0A"/>
  <circle cx="198" cy="372" r="9"  fill="#F07800"/>

  <!-- ═══ FRONT WHEEL ═══ -->
  <circle cx="582" cy="390" r="70" fill="#0A0A0A"/>
  <circle cx="582" cy="390" r="52" fill="#181810"/>
  <line x1="582" y1="320" x2="582" y2="460" stroke="#0A0A0A" stroke-width="4.5"/>
  <line x1="512" y1="390" x2="652" y2="390" stroke="#0A0A0A" stroke-width="4.5"/>
  <line x1="533" y1="341" x2="631" y2="439" stroke="#0A0A0A" stroke-width="3.5"/>
  <line x1="631" y1="341" x2="533" y2="439" stroke="#0A0A0A" stroke-width="3.5"/>
  <circle cx="582" cy="390" r="38" fill="none" stroke="#F07800" stroke-width="8.5"/>
  <circle cx="582" cy="390" r="14" fill="#0A0A0A"/>
  <circle cx="582" cy="390" r="7"  fill="#F07800"/>

  <!-- ═══ DELIVERY BOX (back of scooter) ═══ -->
  <!-- Box shadow -->
  <rect x="72" y="206" width="236" height="162" rx="12" fill="rgba(10,10,10,0.08)" transform="translate(4,5)"/>
  <!-- Box body -->
  <rect x="72" y="206" width="236" height="162" rx="12" fill="#FAF8F4"/>
  <rect x="72" y="206" width="236" height="162" rx="12" fill="none" stroke="#E8E4DA" stroke-width="2"/>
  <!-- Orange top band -->
  <path d="M72 218 Q72 206 84 206 H296 Q308 206 308 218 V252 H72 Z" fill="#F07800"/>
  <!-- "Mamakaasa" on band -->
  <text x="190" y="234" text-anchor="middle" fill="white"
        font-family="'Manrope','Inter',sans-serif" font-weight="800"
        font-size="16" letter-spacing="1">Mamakaasa</text>
  <!-- Handle on top -->
  <rect x="148" y="193" width="84" height="18" rx="9" fill="#D96A00"/>
  <rect x="148" y="196" width="84" height="8" rx="4" fill="#E87800" opacity="0.5"/>
  <!-- Box content area -->
  <!-- Vertical divider -->
  <line x1="190" y1="252" x2="190" y2="360" stroke="#EDE9E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Fruits -->
  <text x="131" y="305" font-size="34" text-anchor="middle">🥭</text>
  <text x="249" y="305" font-size="34" text-anchor="middle">🍅</text>
  <text x="131" y="352" font-size="24" text-anchor="middle">🌽</text>
  <text x="249" y="352" font-size="24" text-anchor="middle">🥬</text>

  <!-- ═══ SCOOTER BODY ═══ -->
  <!-- Main frame / undercarriage -->
  <path d="M278 358 Q295 335 320 310 Q348 282 400 265 Q450 250 510 244 L570 240 Q610 238 635 248 Q652 258 656 278 L652 310 Q640 328 618 338 L545 352 Q490 358 430 362 L340 368 Q300 368 280 358Z"
        fill="#F07800"/>
  <!-- Body shadow/depth -->
  <path d="M300 340 Q320 318 370 302 Q420 288 490 280 L570 274 Q610 272 638 284 L645 300 Q620 305 585 305 Q530 303 470 308 L370 322 Q320 335 305 350Z"
        fill="#D96A00" opacity="0.45"/>

  <!-- Engine / center cover -->
  <path d="M380 340 Q395 320 430 308 Q468 296 510 292 L548 290 Q570 290 582 300 L580 318 Q565 328 540 334 L470 344 Q418 348 390 348 Q375 348 370 340Z"
