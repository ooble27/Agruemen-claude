  <!-- Text MAMA -->
  <text x="180" y="352"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="900"
        font-size="66"
        fill="#5C1F00"
        text-anchor="middle"
        letter-spacing="5">MAMA</text>

  <!-- Text —KAASA— -->
  <text x="180" y="390"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
