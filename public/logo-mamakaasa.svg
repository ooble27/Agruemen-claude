  <!-- Basket weave lines -->
  <line x1="155" y1="270" x2="152" y2="295" stroke="#7A5020" stroke-width="1.2"/>
  <line x1="172" y1="276" x2="170" y2="300" stroke="#7A5020" stroke-width="1.2"/>
  <line x1="190" y1="280" x2="189" y2="304" stroke="#7A5020" stroke-width="1.2"/>
  <line x1="208" y1="280" x2="208" y2="304" stroke="#7A5020" stroke-width="1.2"/>
  <line x1="226" y1="276" x2="228" y2="300" stroke="#7A5020" stroke-width="1.2"/>
